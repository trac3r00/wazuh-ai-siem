name: security

# Two independent security gates for this repo:
#   1. osv-scan   — SCA gate over the Python integration scripts' dependencies.
#   2. magika-test — self-test the file-masquerade detector against synthetic
#                    samples so a regression in detection logic fails CI.
#
# All scan-args / run steps use static literals — no untrusted event input is
# interpolated, so these workflows are not injectable.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  osv-scan:
    name: OSV dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Freeze integration dependencies to a lockfile
        run: |
          python -m pip install --upgrade pip
          # Runtime deps used by the integration/service scripts.
          pip install requests fastapi pydantic discord.py magika
          pip freeze > requirements.lock.txt
          echo "----- resolved dependency lock -----"
          cat requirements.lock.txt
      - name: Run OSV-Scanner (SARIF, non-blocking upload)
        uses: google/osv-scanner-action@v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --lockfile=requirements.lock.txt
            --format=sarif
            --output=osv-results.sarif
      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif
      - name: Run OSV-Scanner (report)
        uses: google/osv-scanner-action@v2.3.8
        continue-on-error: true  # advisory for a homelab project, not a hard block
        with:
          scan-args: |-
            --lockfile=requirements.lock.txt

  magika-test:
    name: Magika masquerade detector self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install magika
        run: |
          python -m pip install --upgrade pip
          pip install magika
      - name: Run detector self-test (synthetic masquerade samples)
        run: python integrations/selftest_masquerade.py

